<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operator</title>
</head>
<body>
    <script>
        //arithmetic oprators
        // + - * / %
        let x = 30;
        let y = 6;
        let sum = x + y;
        let sub = x - y;
        let div = x / y;
        let mod = x % y;
        let mul = x * y;
        console.log(sum);
        console.log(sub);
        console.log(div);
        console.log(mod);
        console.log(mul);
    </script>
    
</body>
</html>
